version: '3.8'

services:
  chatbot:
    build: .
    container_name: chatbot_barberia
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=True
    restart: unless-stopped
    networks:
      - chatbot_network
      - dokploy-network

networks:
  dokploy-network:
    external: true
  chatbot_network:
    driver: bridge
