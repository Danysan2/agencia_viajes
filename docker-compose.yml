version: '3.8'

services:
  chatbot:
    build: .
    container_name: chatbot_agencia
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
